<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Index článků</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
  #sidebar { width: 360px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #f7f7f7; }
  #filters { padding: 12px; border-bottom: 1px solid #ddd; background: #fff; }
  #filters label { display: block; font-size: 12px; color: #555; margin-top: 6px; }
  #filters input, #filters select { width: 100%; padding: 4px 6px; font-size: 13px; }
  #picker { padding: 12px; background: #fff; border-bottom: 1px solid #ddd; }
  #picker button { width: 100%; padding: 8px; font-size: 13px; cursor: pointer; }
  #picker .hint { font-size: 11px; color: #888; margin-top: 6px; }
  #count { margin-top: 8px; font-size: 12px; color: #666; }
  #list { flex: 1; overflow-y: auto; }
  .item { padding: 8px 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
  .item:hover { background: #eef; }
  .item.active { background: #dde; }
  .item .title { font-weight: 600; margin-bottom: 2px; }
  .item .meta { color: #666; font-size: 11px; }
  .pill { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; margin-right: 3px; }
  .v-Dominantní, .e-Dominantní { background: #c8e6c9; }
  .v-Přítomný, .e-Přítomný { background: #fff9c4; }
  .v-Marginální, .e-Marginální { background: #ffe0b2; }
  .v-Žádný, .e-Žádný { background: #eee; color: #999; }
  #main { flex: 1; overflow-y: auto; padding: 24px 32px; }
  #main h1 { margin-top: 0; }
  #main .attrs { background: #f7f7f7; padding: 12px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; }
  #main .attrs div { margin: 2px 0; }
  #main .body { white-space: pre-wrap; line-height: 1.5; }
  #main a { color: #1565c0; }
  .empty { color: #999; padding: 40px; text-align: center; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="picker">
    <button id="pick-btn">Načíst složku articles/</button>
    <input id="pick-input" type="file" webkitdirectory multiple style="display:none" accept=".md">
    <div class="hint">Vyber složku <code>articles/</code> v projektu. Vše se zpracuje v prohlížeči.</div>
  </div>
  <div id="filters" style="display:none">
    <label>Hledat (název / zdroj / text)
      <input id="f-search" type="text" placeholder="...">
    </label>
    <label>Zdroj
      <select id="f-zdroj"><option value="">— vše —</option></select>
    </label>
    <label>Rok
      <select id="f-rok"><option value="">— vše —</option></select>
    </label>
    <label>Intenzita vegan
      <select id="f-vegan"><option value="">— vše —</option></select>
    </label>
    <label>Intenzita enviro
      <select id="f-enviro"><option value="">— vše —</option></select>
    </label>
    <label>Dotaz obsahuje
      <input id="f-dotaz" type="text" placeholder="...">
    </label>
    <div id="count"></div>
  </div>
  <div id="list"></div>
</div>
<div id="main"><div class="empty">Načti složku <code>articles/</code> vlevo</div></div>

<script>
const $ = (id) => document.getElementById(id);

function parseFrontmatter(text) {
  const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if (!m) return { fm: {}, body: text };
  const fm = {};
  for (const line of m[1].split('\n')) {
    const i = line.indexOf(':');
    if (i < 0) continue;
    fm[line.slice(0, i).trim()] = line.slice(i + 1).trim();
  }
  return { fm, body: m[2].trim() };
}

let ARTICLES = [];
let activeIdx = null;

const filters = {};

function unique(arr) { return [...new Set(arr)].filter(x => x).sort(); }

function fillSelect(sel, values) {
  sel.innerHTML = '<option value="">— vše —</option>';
  for (const v of values) {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  }
}

function matches(a) {
  const s = filters.search.value.trim().toLowerCase();
  if (s) {
    const hay = (a.nazev + ' ' + a.zdroj + ' ' + a.body).toLowerCase();
    if (!hay.includes(s)) return false;
  }
  if (filters.zdroj.value && a.zdroj !== filters.zdroj.value) return false;
  if (filters.rok.value && !(a.datum || '').startsWith(filters.rok.value)) return false;
  if (filters.vegan.value && a.intenzita_vegan !== filters.vegan.value) return false;
  if (filters.enviro.value && a.intenzita_enviro !== filters.enviro.value) return false;
  const d = filters.dotaz.value.trim().toLowerCase();
  if (d && !(a.dotaz || '').toLowerCase().includes(d)) return false;
  return true;
}

function render() {
  const list = $('list');
  list.innerHTML = '';
  const visible = ARTICLES.filter(matches);
  $('count').textContent = visible.length + ' / ' + ARTICLES.length + ' článků';
  for (const a of visible) {
    const div = document.createElement('div');
    div.className = 'item' + (a === ARTICLES[activeIdx] ? ' active' : '');
    div.innerHTML = `
      <div class="title"></div>
      <div class="meta"></div>
      <div>
        <span class="pill v-${a.intenzita_vegan}">V: ${a.intenzita_vegan || '?'}</span>
        <span class="pill e-${a.intenzita_enviro}">E: ${a.intenzita_enviro || '?'}</span>
      </div>`;
    div.querySelector('.title').textContent = a.nazev || a.filename;
    div.querySelector('.meta').textContent = `${a.datum} · ${a.zdroj}`;
    div.onclick = () => { activeIdx = ARTICLES.indexOf(a); render(); show(a); };
    list.appendChild(div);
  }
}

function show(a) {
  const main = $('main');
  main.innerHTML = '';
  const h = document.createElement('h1'); h.textContent = a.nazev; main.appendChild(h);
  const attrs = document.createElement('div'); attrs.className = 'attrs';
  const rows = [
    ['Datum', a.datum], ['Zdroj', a.zdroj],
    ['Intenzita vegan', a.intenzita_vegan], ['Intenzita enviro', a.intenzita_enviro],
    ['Dotaz', a.dotaz],
  ];
  for (const [k, v] of rows) {
    const d = document.createElement('div');
    const b = document.createElement('b'); b.textContent = k + ':';
    d.appendChild(b);
    d.appendChild(document.createTextNode(' ' + (v || '')));
    attrs.appendChild(d);
  }
  if (a.url) {
    const d = document.createElement('div');
    const b = document.createElement('b'); b.textContent = 'URL:';
    d.appendChild(b);
    d.appendChild(document.createTextNode(' '));
    const link = document.createElement('a');
    link.href = a.url; link.target = '_blank'; link.textContent = a.url;
    d.appendChild(link);
    attrs.appendChild(d);
  }
  main.appendChild(attrs);
  const body = document.createElement('div'); body.className = 'body';
  body.textContent = a.body;
  main.appendChild(body);
}

async function loadFiles(fileList) {
  const mds = [...fileList].filter(f => f.name.toLowerCase().endsWith('.md'));
  mds.sort((a, b) => a.name.localeCompare(b.name));
  ARTICLES = await Promise.all(mds.map(async (f) => {
    const text = await f.text();
    const { fm, body } = parseFrontmatter(text);
    return {
      filename: f.name,
      nazev: fm.nazev || '', url: fm.url || '', datum: fm.datum || '',
      zdroj: fm.zdroj || '',
      intenzita_vegan: fm.intenzita_vegan || '',
      intenzita_enviro: fm.intenzita_enviro || '',
      dotaz: fm.dotaz || '', body,
    };
  }));

  $('filters').style.display = '';
  filters.search = $('f-search'); filters.zdroj = $('f-zdroj'); filters.rok = $('f-rok');
  filters.vegan = $('f-vegan'); filters.enviro = $('f-enviro'); filters.dotaz = $('f-dotaz');

  fillSelect(filters.zdroj, unique(ARTICLES.map(a => a.zdroj)));
  fillSelect(filters.rok, unique(ARTICLES.map(a => (a.datum || '').slice(0, 4))));
  fillSelect(filters.vegan, unique(ARTICLES.map(a => a.intenzita_vegan)));
  fillSelect(filters.enviro, unique(ARTICLES.map(a => a.intenzita_enviro)));

  for (const el of Object.values(filters)) el.addEventListener('input', render);
  render();
  $('main').innerHTML = '<div class="empty">Vyberte článek vlevo</div>';
}

$('pick-btn').onclick = () => $('pick-input').click();
$('pick-input').onchange = (e) => loadFiles(e.target.files);
</script>
</body>
</html>
